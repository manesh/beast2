# Phase 0 runtime workspace. Change this to move the Beast2 data root.
workspace_root = ./runtime/beast2

# Relative paths are resolved from the workspace root above.
log_file = db/performance_logs/beast2.log

# Mirror logs to stderr while still writing the file log.
log_to_stderr = true

# Phase 0 bootstraps the expected directory layout automatically.
create_missing_directories = true

# The binary scans these roots during startup and reports what it found.
scan_directories = models, generators, latents, outputs, thumbs, db, cache
